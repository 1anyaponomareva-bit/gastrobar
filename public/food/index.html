<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12121a" />
    <meta name="description" content="Gastrofood — меню фуд-трака GASTROBAR." />
    <title>Gastrofood — Меню</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-header">
      <div class="header-inner">
        <div class="header-side header-side--left">
          <a
            href="https://t.me/gastrobar_oceanus"
            target="_blank"
            rel="noopener noreferrer"
            class="icon-btn"
            aria-label="Telegram"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"
              />
            </svg>
          </a>
          <a
            href="https://maps.app.goo.gl/ihhQ16yVfRDdtRzcA"
            target="_blank"
            rel="noopener noreferrer"
            class="icon-btn"
            aria-label="Локация"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
          </a>
        </div>

        <div class="header-logo">
          <img
            src="menu/GASTROFOOD.png"
            alt="Gastrofood"
            class="header-logo__img"
            width="160"
            height="52"
            draggable="false"
          />
        </div>

        <div class="header-side header-side--right" aria-hidden="true"></div>
      </div>
    </header>

    <div class="category-tabs-wrap">
      <div class="category-tabs-wrap__inner">
        <div class="category-tabs" role="tablist" aria-label="Категории меню" id="category-tabs"></div>
      </div>
    </div>

    <main class="app-shell" aria-label="Меню">
      <div class="menu-scroll" id="menu-scroll">
        <div class="menu-list" id="menu-list" role="list">
          <div class="menu-list__spacer" aria-hidden="true"></div>
        </div>

        <div class="menu-empty is-hidden" id="menu-empty">
          <p class="menu-empty__text">Скоро здесь появятся блюда</p>
          <p class="menu-empty__sub">Следите за обновлениями в Telegram</p>
        </div>
      </div>
    </main>

    <div class="detail-overlay is-hidden" id="detail-overlay" aria-hidden="true">
      <button type="button" class="detail-back" id="detail-back" aria-label="Назад">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>
      <div class="detail-counter is-hidden" id="detail-counter"></div>
      <div class="detail-stage" id="detail-stage"></div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
